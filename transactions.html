<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alke Wallet - Últimos Movimientos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./css/transactions.css">
    <link rel="stylesheet" href="./css/global.css">
</head>
<body>

    <nav class="navbar navbar-dark fintech-primary">
        <div class="container">
            <a class="navbar-brand" href="menu.html">⬅ Volver al Menú</a>
        </div>
    </nav>

    <div class="container mt-5 fade-in-section" id="transactionsContent">
        <div class="card fintech-card p-4 mx-auto" style="max-width: 800px;">
            <h4 class="mb-4">Últimos Movimientos</h4>
            
            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead class="table-light">
                        <tr>
                            <th>Fecha</th>
                            <th>Tipo</th>
                            <th>Detalle</th>
                            <th class="text-end">Monto</th>
                        </tr>
                    </thead>
                    <tbody id="tablaMovimientos">
                        <!-- Las transacciones se cargarán aquí con jQuery -->
                    </tbody>
                </table>
            </div>
            <div id="mensajeSinMovimientos" class="text-center text-muted" style="display: none;">
                No hay movimientos recientes.
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="./js/global.js"></script>
    <script src="./js/transactions.js"></script>
</body>
</html>
