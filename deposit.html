<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alke Wallet - Depositar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar navbar-dark fintech-primary">
        <div class="container">
            <a class="navbar-brand" href="menu.html">⬅ Volver al Menú</a>
        </div>
    </nav>

    <div class="container mt-5 fade-in-section" id="depositContent">
        <div class="card fintech-card p-4 mx-auto" style="max-width: 500px;">
            <h4 class="mb-4">Ingresar Dinero</h4>
            
            <p class="text-muted">Saldo actual: <strong id="saldoTransferencia">$0</strong></p>

            <form id="depositForm">
                <div class="mb-3">
                    <label for="depositAmount" class="form-label">Monto a Depositar ($)</label>
                    <input type="number" class="form-control" id="depositAmount" min="1" required placeholder="Ej: 50000">
                </div>
                <button type="submit" class="btn btn-primary w-100 fw-bold">Realizar Depósito</button>
            </form>
            
            <div id="transferMessage" class="mt-3 text-center" style="display: none;"></div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
