<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alke Wallet - Enviar Dinero</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- jQuery UI CSS para autocompletado -->
    <link rel="stylesheet" href="https://code.jquery.com/ui/1.13.2/themes/base/jquery-ui.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar navbar-dark fintech-primary">
        <div class="container">
            <a class="navbar-brand" href="menu.html">⬅ Volver al Menú</a>
        </div>
    </nav>

    <div class="container mt-5 fade-in-section" id="sendMoneyContent">
        <div class="card fintech-card p-4 mx-auto" style="max-width: 500px;">
            <h4 class="mb-4">Transferir Fondos</h4>
            
            <p class="text-muted">Saldo disponible: <strong id="saldoTransferencia">$0</strong></p>

            <form id="sendForm">
                <div class="mb-3">
                    <label for="contact" class="form-label">Buscar Contacto</label>
                    <!-- Campo para Autocompletar con jQuery -->
                    <input type="text" class="form-control" id="contact" placeholder="Escribe un nombre..." required>
                </div>
                <div class="mb-3">
                    <label for="amount" class="form-label">Monto a Enviar ($)</label>
                    <input type="number" class="form-control" id="amount" min="1" required>
                </div>
                <button type="submit" class="btn btn-success w-100">Confirmar Transferencia</button>
            </form>
            
            <div id="transferMessage" class="mt-3 text-center" style="display: none;"></div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
