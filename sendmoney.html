<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alke Wallet - Enviar Dinero</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://code.jquery.com/ui/1.13.2/themes/base/jquery-ui.css">
    
    <!-- Rutas modulares de CSS -->
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/sendmoney.css">
</head>
<body>

    <nav class="navbar navbar-dark fintech-primary">
        <div class="container">
            <a class="navbar-brand" href="menu.html">⬅ Volver al Menú</a>
        </div>
    </nav>

    <!-- Contenedor Principal de la Tarjeta -->
    <div class="container mt-5 fade-in-section" id="sendMoneyContent">
        <div class="card fintech-card p-4 mx-auto" style="max-width: 500px;">
            <h4 class="mb-4">Transferir Fondos</h4>
            
            <p class="text-muted">Saldo disponible: <strong id="saldoTransferencia">$0</strong></p>

            <!-- Formulario de Transferencia -->
            <form id="sendForm">
                
                <!-- Búsqueda y Botón Modal -->
                <div class="d-flex justify-content-between align-items-center mb-2">
                    <label for="contact" class="form-label mb-0">Buscar Contacto</label>
                    <button type="button" class="btn btn-sm btn-outline-primary" data-bs-toggle="modal" data-bs-target="#addContactModal">
                        + Nuevo Contacto
                    </button>
                </div>
                <input type="text" class="form-control mb-3" id="contact" placeholder="Escribe un nombre..." required>

                <!-- Ingreso de Monto -->
                <div class="mb-3">
                    <label for="amount" class="form-label">Monto a Enviar ($)</label>
                    <input type="number" class="form-control" id="amount" min="1" required>
                </div>
                
                <button type="submit" class="btn btn-success w-100">Confirmar Transferencia</button>
            </form>
            
            <div id="transferMessage" class="mt-3 text-center" style="display: none;"></div>
        </div>
    </div>

    <!-- El componente Modal (Ventana emergente) -->
    <div class="modal fade" id="addContactModal" tabindex="-1" aria-labelledby="modalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title text-dark" id="modalLabel">Agregar Nuevo Contacto</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label for="newContactName" class="form-label text-dark">Nombre del Contacto</label>
                        <input type="text" class="form-control" id="newContactName" placeholder="Ej. Pedro Pérez">
                    </div>
                    <button type="button" id="btnSaveContact" class="btn btn-primary w-100">Guardar Contacto</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>
    
    <!-- Rutas Modulares de JS -->
    <script src="js/global.js"></script>
    <script src="js/sendmoney.js"></script>
</body>
</html>
